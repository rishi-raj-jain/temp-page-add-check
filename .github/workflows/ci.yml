name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Determine turbo filter
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "args=--filter='...[origin/main]'" >> $GITHUB_OUTPUT
          else
            # On push to main or manual dispatch, run all packages
            echo "args=" >> $GITHUB_OUTPUT
          fi

      - name: Build
        run: pnpm turbo build ${{ steps.filter.outputs.args }} --filter='!./packages/creem-io'

      - name: Typecheck
        run: pnpm turbo typecheck ${{ steps.filter.outputs.args }} --filter='!./packages/creem-io' --filter='!./packages/creem-sdk'

      - name: Test
        env:
          TEST_API_KEY: ${{ secrets.TEST_API_KEY }}
        run: pnpm turbo test ${{ steps.filter.outputs.args }} --filter='!./packages/creem-io'

      - name: Lint
        run: pnpm turbo lint ${{ steps.filter.outputs.args }} --filter='!./packages/creem-io' --filter='!./packages/creem-sdk'

      - name: Format check
        run: pnpm format:check
